<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — My To-Do App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #15151f;
    --surface2: #1c1c2a;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76ab4;
    --accent3: #6af7c8;
    --text: #f0effe;
    --muted: #6b6b85;
    --high: #f76a6a;
    --med: #f7b76a;
    --low: #6af7c8;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease both;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .theme-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .theme-btn:hover { background: var(--border); }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill span { color: var(--text); font-weight: 600; }

  /* PROGRESS */
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    margin-top: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
    animation: fadeDown 0.5s 0.1s ease both;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    animation: fadeDown 0.5s 0.15s ease both;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .task-input:focus { border-color: var(--accent); }
  .task-input::placeholder { color: var(--muted); }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.9; }
  .add-btn:active { transform: scale(0.97); }

  .form-options {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    margin-right: 4px;
  }

  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .chip.cat-work.active { background: #4a8cf7; border-color: #4a8cf7; }
  .chip.cat-shopping.active { background: #f7b76a; border-color: #f7b76a; color: #1a1a1a; }
  .chip.cat-health.active { background: #6af7c8; border-color: #6af7c8; color: #1a1a1a; }
  .chip.cat-school.active { background: #f76af7; border-color: #f76af7; }
  .chip.pri-high.active { background: var(--high); border-color: var(--high); }
  .chip.pri-med.active { background: var(--med); border-color: var(--med); color: #1a1a1a; }
  .chip.pri-low.active { background: var(--low); border-color: var(--low); color: #1a1a1a; }

  .due-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 5px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  .due-input:focus { border-color: var(--accent); }

  /* FILTER TABS */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .filter-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 7px 16px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 6px;
  }
  .filter-tab .count {
    background: var(--surface2);
    border-radius: 50px;
    padding: 1px 7px;
    font-size: 0.72rem;
  }
  .filter-tab:hover { color: var(--text); border-color: var(--accent); }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-tab.active .count { background: rgba(255,255,255,0.2); }

  /* SORT */
  .sort-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .sort-label { font-size: 0.75rem; color: var(--muted); }
  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.75rem;
    outline: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color-scheme: dark;
  }

  /* TASK LIST */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.25s;
    animation: slideIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .task-item.pri-High::before { background: var(--high); }
  .task-item.pri-Medium::before { background: var(--med); }
  .task-item.pri-Low::before { background: var(--low); }

  .task-item:hover { border-color: var(--accent); transform: translateY(-1px); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-name { text-decoration: line-through; }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .check-btn:hover { border-color: var(--accent3); }
  .check-btn.checked { background: var(--accent3); border-color: var(--accent3); }
  .check-btn.checked::after { content: '✓'; font-size: 0.7rem; color: #0d1a14; font-weight: 800; }

  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 0.95rem; font-weight: 500; word-break: break-word; margin-bottom: 6px; }

  .task-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 50px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tag.cat { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag.cat-Work { background: rgba(74,140,247,0.15); color: #4a8cf7; border: 1px solid rgba(74,140,247,0.3); }
  .tag.cat-Shopping { background: rgba(247,183,106,0.15); color: var(--med); border: 1px solid rgba(247,183,106,0.3); }
  .tag.cat-Health { background: rgba(106,247,200,0.15); color: var(--accent3); border: 1px solid rgba(106,247,200,0.3); }
  .tag.cat-School { background: rgba(247,106,247,0.15); color: #f76af7; border: 1px solid rgba(247,106,247,0.3); }
  .tag.cat-Personal { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
  .tag.pri-High { background: rgba(247,106,106,0.15); color: var(--high); border: 1px solid rgba(247,106,106,0.3); }
  .tag.pri-Medium { background: rgba(247,183,106,0.15); color: var(--med); border: 1px solid rgba(247,183,106,0.3); }
  .tag.pri-Low { background: rgba(106,247,200,0.15); color: var(--accent3); border: 1px solid rgba(106,247,200,0.3); }
  .tag.due { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag.due.overdue { background: rgba(247,106,106,0.15); color: var(--high); border-color: rgba(247,106,106,0.3); }

  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .icon-btn.del:hover { color: var(--high); border-color: var(--high); }

  /* EDIT MODE */
  .edit-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 6px;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; }

  /* BOTTOM BAR */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--muted);
    flex-wrap: wrap;
    gap: 10px;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .clear-btn:hover { border-color: var(--high); color: var(--high); }

  /* LIGHT MODE */
  body.light {
    --bg: #f4f3ff;
    --surface: #ffffff;
    --surface2: #eeedf8;
    --border: #d8d6f0;
    --text: #1a1a2e;
    --muted: #8886a8;
  }

  /* NOTIFICATION TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 0.85rem;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    z-index: 100;
    animation: slideToast 0.3s ease;
    max-width: 280px;
  }
  .toast.hide { animation: hideToast 0.3s ease forwards; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideToast {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes hideToast {
    to { opacity: 0; transform: translateY(20px); }
  }

  @media (max-width: 480px) {
    .form-options { flex-direction: column; align-items: flex-start; }
    .input-row { flex-direction: column; }
    .add-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <h1>TaskFlow ✦</h1>
      <button class="theme-btn" onclick="toggleTheme()">☀️ Light Mode</button>
    </div>
    <div class="stats">
      <div class="stat-pill">Total: <span id="totalCount">0</span></div>
      <div class="stat-pill">Done: <span id="doneCount">0</span></div>
      <div class="stat-pill">Left: <span id="leftCount">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search tasks..." oninput="render()">
  </div>

  <!-- ADD FORM -->
  <div class="add-form">
    <div class="input-row">
      <input class="task-input" type="text" id="taskInput" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">+ Add Task</button>
    </div>
    <div class="form-options">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="label">Category</span>
        <div class="chip-group" id="catChips">
          <button class="chip cat-personal active" data-val="Personal" onclick="selectChip(this,'cat')">Personal</button>
          <button class="chip cat-work" data-val="Work" onclick="selectChip(this,'cat')">Work</button>
          <button class="chip cat-shopping" data-val="Shopping" onclick="selectChip(this,'cat')">Shopping</button>
          <button class="chip cat-health" data-val="Health" onclick="selectChip(this,'cat')">Health</button>
          <button class="chip cat-school" data-val="School" onclick="selectChip(this,'cat')">School</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span class="label">Priority</span>
        <div class="chip-group" id="priChips">
          <button class="chip pri-high" data-val="High" onclick="selectChip(this,'pri')">🔴 High</button>
          <button class="chip pri-med active" data-val="Medium" onclick="selectChip(this,'pri')">🟡 Medium</button>
          <button class="chip pri-low" data-val="Low" onclick="selectChip(this,'pri')">🟢 Low</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="label">Due</span>
        <input class="due-input" type="date" id="dueInput">
      </div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-row" id="filterRow">
    <button class="filter-tab active" data-filter="All" onclick="setFilter(this)">All <span class="count" id="fc-All">0</span></button>
    <button class="filter-tab" data-filter="Personal" onclick="setFilter(this)">Personal <span class="count" id="fc-Personal">0</span></button>
    <button class="filter-tab" data-filter="Work" onclick="setFilter(this)">Work <span class="count" id="fc-Work">0</span></button>
    <button class="filter-tab" data-filter="Shopping" onclick="setFilter(this)">Shopping <span class="count" id="fc-Shopping">0</span></button>
    <button class="filter-tab" data-filter="Health" onclick="setFilter(this)">Health <span class="count" id="fc-Health">0</span></button>
    <button class="filter-tab" data-filter="School" onclick="setFilter(this)">School <span class="count" id="fc-School">0</span></button>
  </div>

  <!-- SORT -->
  <div class="sort-row">
    <span class="sort-label">Tasks</span>
    <select class="sort-select" onchange="render()">
      <option value="priority">Sort by Priority</option>
      <option value="due">Sort by Due Date</option>
      <option value="name">Sort by Name</option>
      <option value="added">Sort by Added</option>
    </select>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="taskList"></div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <span id="bottomInfo">0 of 0 completed</span>
    <button class="clear-btn" onclick="clearDone()">Clear Completed</button>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let selectedCat = 'Personal';
  let selectedPri = 'Medium';
  let activeFilter = 'All';

  const priOrder = { High: 0, Medium: 1, Low: 2 };

  function save() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function selectChip(el, type) {
    const group = el.closest('.chip-group');
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    if (type === 'cat') selectedCat = el.dataset.val;
    if (type === 'pri') selectedPri = el.dataset.val;
  }

  function setFilter(el) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    activeFilter = el.dataset.filter;
    render();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const name = input.value.trim();
    if (!name) { showToast('Please type a task first! 📝'); return; }
    const due = document.getElementById('dueInput').value;
    tasks.push({
      id: Date.now(),
      name,
      cat: selectedCat,
      pri: selectedPri,
      due: due || '',
      done: false,
      added: Date.now()
    });
    input.value = '';
    document.getElementById('dueInput').value = '';
    save();
    render();
    showToast('Task added! ✦');
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
    showToast('Task deleted 🗑️');
  }

  function startEdit(id) {
    const t = tasks.find(t => t.id === id);
    const item = document.querySelector(`[data-id="${id}"]`);
    const nameEl = item.querySelector('.task-name');
    const orig = nameEl.textContent;
    nameEl.innerHTML = `<input class="edit-input" value="${orig}" id="edit_${id}">
      <button class="add-btn" style="padding:6px 14px;font-size:0.8rem" onclick="saveEdit(${id})">Save</button>`;
    document.getElementById(`edit_${id}`).focus();
    document.getElementById(`edit_${id}`).onkeydown = e => { if(e.key==='Enter') saveEdit(id); if(e.key==='Escape') render(); };
  }

  function saveEdit(id) {
    const val = document.getElementById(`edit_${id}`).value.trim();
    if (val) { tasks.find(t => t.id === id).name = val; save(); }
    render();
  }

  function clearDone() {
    const count = tasks.filter(t => t.done).length;
    if (!count) { showToast('No completed tasks!'); return; }
    tasks = tasks.filter(t => !t.done);
    save(); render();
    showToast(`Cleared ${count} task${count>1?'s':''}! 🎉`);
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
    const btn = document.querySelector('.theme-btn');
    btn.textContent = document.body.classList.contains('light') ? '🌙 Dark Mode' : '☀️ Light Mode';
  }

  function isOverdue(due) {
    if (!due) return false;
    return new Date(due) < new Date(new Date().toDateString());
  }

  function formatDue(due) {
    if (!due) return '';
    const d = new Date(due + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function getSorted(list) {
    const sel = document.querySelector('.sort-select').value;
    return [...list].sort((a, b) => {
      if (sel === 'priority') return priOrder[a.pri] - priOrder[b.pri];
      if (sel === 'due') {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1; if (!b.due) return -1;
        return a.due.localeCompare(b.due);
      }
      if (sel === 'name') return a.name.localeCompare(b.name);
      return b.added - a.added;
    });
  }

  function render() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cats = ['Personal','Work','Shopping','Health','School'];

    // counts for filter tabs
    const allActive = tasks.filter(t => !t.done);
    document.getElementById('fc-All').textContent = allActive.length;
    cats.forEach(c => {
      const el = document.getElementById('fc-' + c);
      if (el) el.textContent = allActive.filter(t => t.cat === c).length;
    });

    let filtered = tasks.filter(t => {
      const matchFilter = activeFilter === 'All' || t.cat === activeFilter;
      const matchSearch = t.name.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    filtered = getSorted(filtered);

    const list = document.getElementById('taskList');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="emoji">${search ? '🔍' : '✦'}</div><p>${search ? 'No tasks match your search.' : 'No tasks here yet. Add one above!'}</p></div>`;
    } else {
      list.innerHTML = filtered.map(t => `
        <div class="task-item pri-${t.pri} ${t.done?'done':''}" data-id="${t.id}">
          <button class="check-btn ${t.done?'checked':''}" onclick="toggleDone(${t.id})"></button>
          <div class="task-body">
            <div class="task-name">${escHtml(t.name)}</div>
            <div class="task-meta">
              <span class="tag cat cat-${t.cat}">${t.cat}</span>
              <span class="tag pri-${t.pri}">${t.pri}</span>
              ${t.due ? `<span class="tag due ${isOverdue(t.due)?'overdue':''}">📅 ${formatDue(t.due)}${isOverdue(t.due)?' ⚠️':''}</span>` : ''}
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn" onclick="startEdit(${t.id})" title="Edit">✏️</button>
            <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Delete">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('leftCount').textContent = total - done;
    document.getElementById('bottomInfo').textContent = `${done} of ${total} completed`;
    document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      t.classList.add('hide');
      setTimeout(() => t.remove(), 300);
    }, 2500);
  }

  render();
</script>
</body>
</html>
